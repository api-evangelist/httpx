aid: httpx
name: HTTPX
description: >-
  HTTPX is a fully featured HTTP client for Python 3 with sync and async
  APIs, HTTP/1.1 and HTTP/2 support. It is broadly compatible with the
  popular requests library while adding modern features such as strict
  timeouts, type annotations, direct WSGI and ASGI transport, SSL
  verification, cookie persistence, proxy support, and multipart uploads.
